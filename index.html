<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="A productivity app demonstrating modern Progressive Web App capabilities and best practices" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Daily Focus" />
    <meta name="application-name" content="Daily Focus" />
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/pwa-demo/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/pwa-demo/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/pwa-demo/icons/icon-16x16.png" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/pwa-demo/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-demo/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-demo/icons/icon-180x180.png" />

    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/pwa-demo/icons/apple-splash-2048-2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />

    <title>Daily Focus - PWA Demo</title>

    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- No-JS Fallback -->
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: system-ui, sans-serif;">
        <h1>Daily Focus</h1>
        <p>This app requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
  </body>
</html>
